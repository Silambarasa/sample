<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Portal</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #0d0d0f;
            --paper: #f5f3ef;
            --accent: #e8451e;
            --accent2: #f0c04a;
            --muted: #888580;
            --border: #d6d3cc;
            --card: #ffffff;
            --field-bg: #faf9f7;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--paper);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Background texture pattern */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 15% 20%, rgba(232,69,30,0.06) 0%, transparent 50%),
                radial-gradient(circle at 85% 80%, rgba(240,192,74,0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Decorative grid dots */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, #c4c0b8 1px, transparent 1px);
            background-size: 28px 28px;
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 560px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
            padding: 0 0.2rem;
        }

        .top-bar .badge {
            font-family: 'Syne', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .top-bar .badge::before {
            content: '';
            display: block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .top-bar .ref {
            font-size: 0.65rem;
            color: var(--border);
            font-family: 'Syne', sans-serif;
            letter-spacing: 0.05em;
        }

        .card {
            background: var(--card);
            border-radius: 4px;
            border: 1.5px solid var(--ink);
            box-shadow: 6px 6px 0px var(--ink);
            overflow: hidden;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            padding: 2rem 2.5rem 1.8rem;
            border-bottom: 1.5px solid var(--ink);
            background: var(--ink);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .card-header::after {
            content: '✦';
            position: absolute;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 3.5rem;
            color: var(--accent2);
            opacity: 0.7;
            line-height: 1;
            animation: spinSlow 12s linear infinite;
        }

        @keyframes spinSlow {
            from { transform: translateY(-50%) rotate(0deg); }
            to { transform: translateY(-50%) rotate(360deg); }
        }

        .card-header h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            position: relative;
            z-index: 1;
        }

        .card-header h2 span { color: var(--accent2); }

        .card-header p {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            position: relative;
            z-index: 1;
        }

        .card-body { padding: 2.2rem 2.5rem 2rem; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem 1.4rem;
        }

        .full-width { grid-column: span 2; }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-family: 'Syne', sans-serif;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .field-wrap { position: relative; }

        .field-icon {
            position: absolute;
            left: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
            display: flex;
        }

        .field-icon.top-align { top: 1rem; transform: none; }

        input, textarea {
            width: 100%;
            padding: 0.75rem 0.9rem 0.75rem 2.4rem;
            background: var(--field-bg);
            border: 1.5px solid var(--border);
            border-radius: 4px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            color: var(--ink);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            -webkit-appearance: none;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--ink);
            background: #fff;
            box-shadow: 3px 3px 0px var(--ink);
        }

        textarea { resize: vertical; min-height: 100px; padding-top: 0.75rem; }

        .dept-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }

        .dept-chip {
            font-family: 'Syne', sans-serif;
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.25rem 0.6rem;
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--muted);
            cursor: pointer;
            background: var(--field-bg);
            transition: all 0.15s;
            user-select: none;
        }

        .dept-chip:hover { border-color: var(--ink); color: var(--ink); }

        .dept-chip.active { background: var(--ink); color: white; border-color: var(--ink); }

        .divider {
            border: none;
            border-top: 1.5px dashed var(--border);
            margin: 1.5rem 0;
            grid-column: span 2;
        }

        button[type="submit"] {
            width: 100%;
            padding: 0.9rem 1.5rem;
            background: var(--accent);
            color: white;
            border: 1.5px solid var(--ink);
            border-radius: 4px;
            font-family: 'Syne', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--ink);
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }

        button[type="submit"]:hover:not(:disabled) { box-shadow: 2px 2px 0px var(--ink); transform: translate(2px, 2px); }
        button[type="submit"]:active:not(:disabled) { box-shadow: 0px 0px 0px var(--ink); transform: translate(4px, 4px); }
        button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        button[type="submit"].loading .btn-spinner { display: block; }
        button[type="submit"].loading .btn-text { display: none; }

        #status-msg {
            margin-top: 1rem;
            padding: 0.85rem 1rem;
            border-radius: 4px;
            font-size: 0.85rem;
            display: none;
            border: 1.5px solid;
            font-family: 'Syne', sans-serif;
        }

        .success-style { display: block !important; background: #ecfdf5; color: #065f46; border-color: #6ee7b7; }
        .error-style { display: block !important; background: #fef2f2; color: #991b1b; border-color: #fca5a5; }

        .card-footer {
            padding: 0.9rem 2.5rem;
            border-top: 1.5px solid var(--border);
            background: var(--field-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .secure-badge {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.68rem;
            color: var(--muted);
            font-family: 'Syne', sans-serif;
        }

        @media (max-width: 480px) {
            .card-header, .card-body, .card-footer { padding-left: 1.4rem; padding-right: 1.4rem; }
            .form-grid { grid-template-columns: 1fr; }
            .full-width, .divider { grid-column: span 1; }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>

<div class="wrapper">
    <div class="top-bar">
        <div class="badge">Live Portal</div>
        <div class="ref">REF #NF-2026</div>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>Submit <br><span>Your issue</span></h2>
            <p>Fill in the details below and we'll route it to the right team.</p>
        </div>

        <div class="card-body">
            <form id="notification-form" novalidate>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <div class="field-wrap">
                            <span class="field-icon">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="5"/><path d="M3 21a9 9 0 0 1 18 0"/></svg>
                            </span>
                            <input type="text" id="username" placeholder="e.g. john_doe" required autocomplete="off">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="mobile">Mobile Number</label>
                        <div class="field-wrap">
                            <span class="field-icon">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>
                            </span>
                            <input type="tel" id="mobile" placeholder="+91 98765 43210" required autocomplete="off">
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label for="email">Email Address</label>
                        <div class="field-wrap">
                            <span class="field-icon">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                            </span>
                            <input type="email" id="email" placeholder="you@company.com" required autocomplete="off">
                        </div>
                    </div>

                    <hr class="divider">

                    <div class="form-group full-width">
                        <label for="dept">Department</label>
                        <div class="field-wrap">
                            <span class="field-icon">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/><path d="M3 9V6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v3"/><path d="M9 22V12h6v10"/></svg>
                            </span>
                            <input type="text" id="dept" list="dept-list" placeholder="Type or pick a department…" required autocomplete="off">
                            <datalist id="dept-list">
                                <option value="Mech"><option value="Civil"><option value="EEE"><option value="ECE"><option value="CSE"><option value="IT">
                            </datalist>
                        </div>
                        <div class="dept-chips">
                            <span class="dept-chip" data-dept="Mech">Mech</span>
                            <span class="dept-chip" data-dept="Civil">Civil</span>
                            <span class="dept-chip" data-dept="EEE">EEE</span>
                            <span class="dept-chip" data-dept="ECE">ECE</span>
                            <span class="dept-chip" data-dept="CSE">CSE</span>
                            <span class="dept-chip" data-dept="IT">IT</span>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label for="desc">Problem Description</label>
                        <div class="field-wrap">
                            <span class="field-icon top-align">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                            </span>
                            <textarea id="desc" placeholder="Describe the issue in detail…" required></textarea>
                        </div>
                    </div>
                </div>

                <div class="btn-row">
                    <button type="submit" id="submit-btn">
                        <div class="btn-spinner"></div>
                        <span class="btn-text">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:6px;"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                            submit
                        </span>
                    </button>
                </div>
            </form>
            <div id="status-msg"></div>
        </div>

        <div class="card-footer">
            <span></span>
            <div class="secure-badge">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                Secure Submission
            </div>
        </div>
    </div>
</div>

<script>
(function () {
    const CONFIG = {
        PUBLIC_KEY: "MAiuwWmn_VCfpe3-I",
        SERVICE_ID: "service_pv04jg6",
        TEMPLATE_ID: "template_5991p85"
    };

    emailjs.init(CONFIG.PUBLIC_KEY);

    const form = document.getElementById('notification-form');
    const btn = document.getElementById('submit-btn');
    const statusMsg = document.getElementById('status-msg');
    const deptInput = document.getElementById('dept');
    const chips = document.querySelectorAll('.dept-chip');

    chips.forEach(chip => {
        chip.addEventListener('click', () => {
            deptInput.value = chip.dataset.dept;
            chips.forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
        });
    });

    deptInput.addEventListener('input', () => {
        const val = deptInput.value.trim().toLowerCase();
        chips.forEach(c => {
            c.classList.toggle('active', c.dataset.dept.toLowerCase() === val);
        });
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        btn.disabled = true;
        btn.classList.add('loading');
        statusMsg.style.display = 'none';
        statusMsg.className = '';

        const templateParams = {
            username: document.getElementById('username').value.trim(),
            mobile_number: document.getElementById('mobile').value.trim(),
            emailid: document.getElementById('email').value.trim(),
            departmentt: deptInput.value.trim(),
            problem_description: document.getElementById('desc').value.trim(),
            time: new Date().toLocaleString()
        };

        try {
            await emailjs.send(CONFIG.SERVICE_ID, CONFIG.TEMPLATE_ID, templateParams);
            statusMsg.textContent = '✓ submitted successfully.';
            statusMsg.className = 'success-style';
            form.reset();
            chips.forEach(c => c.classList.remove('active'));
        } catch (err) {
            console.error(err);
            statusMsg.textContent = '✕ Submission failed. Please try again.';
            statusMsg.className = 'error-style';
        } finally {
            btn.disabled = false;
            btn.classList.remove('loading');
        }
    });
})();
</script>

</body>
</html>
